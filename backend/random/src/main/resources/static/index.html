<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word History Saver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .response {
            margin-top: 20px;
            padding: 10px;
            background-color: #f1f1f1;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Word History Saver</h1>
    <input type="text" id="wordInput" placeholder="Enter a word">
    <button onclick="saveWord()">Save Word</button>
    <div class="response" id="response"></div>
</div>

<script>
    async function saveWord() {
        const word = document.getElementById('wordInput').value;
        const token = localStorage.getItem('token');

        const response = await fetch('/api/savehistory', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            },
            params: {
                word: word
            }
        });

        const data = await response.json();

        if (response.status === 401) {
            // 如果返回 401 状态码，表示需要新的 token
            localStorage.setItem('token', data.token);
            document.getElementById('response').innerText = `请使用新生成的 token: ${data.token}`;
        } else {
            document.getElementById('response').innerText = data;
        }
    }
</script>
</body>
</html>
